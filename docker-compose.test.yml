version: '3.8'

services:
  # 测试数据库服务（如果需要）
  test-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: agentscope_test
      POSTGRES_USER: test_user
      POSTGRES_PASSWORD: test_password
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis服务（如果需要缓存测试）
  test-redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 测试运行服务
  e2e-tests:
    build:
      context: .
      dockerfile: Dockerfile.test
    environment:
      - API_BASE_URL=http://api-server:8000
      - FRONTEND_BASE_URL=http://frontend:3000
      - HEADLESS=true
    volumes:
      - ./test_results:/app/test_results
      - ./e2e:/app/e2e
    command: python e2e/comprehensive_integration_test.py --headless
    depends_on:
      - api-server
      - frontend

  # API服务器（用于测试）
  api-server:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://test_user:test_password@test-db:5432/agentscope_test
      - REDIS_URL=redis://test-redis:6379
    volumes:
      - ./api_server:/app/api_server
      - ./agentscope_paas:/app/agentscope_paas
    command: python -m api_server.main
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # 前端服务（用于测试）
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
    command: npm run dev -- --host 0.0.0.0
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  default:
    name: agentscope-test-network

volumes:
  test_data:
  node_modules: