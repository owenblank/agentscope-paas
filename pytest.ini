[pytest]
# Pytest配置文件

# 测试发现
testpaths = e2e tests
python_files = test_*.py *_test.py *.py
python_classes = Test*
python_functions = test_*

# 输出选项
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    -ra

# 标记定义
markers =
    order: mark test to run in specific order
    unit: Unit tests
    integration: Integration tests
    e2e: End-to-end tests
    api: API tests
    frontend: Frontend tests
    slow: Slow running tests

# 日志配置
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# 超时设置
timeout = 300

# 最小Python版本
minversion = 7.0

# 必需的插件
required_plugins =
    pytest-html
    pytest-json-report