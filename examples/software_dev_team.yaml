# ============================================
# AgentScope PaaS 多智能体团队配置示例
# 团队类型：软件开发协作团队
# ============================================

# ============================================
# 一、团队全局配置（必填）
# ============================================
team_metadata:
  team_id: "dev_team_001"
  team_name: "全栈开发协作团队"
  collaboration_mode: "SequentialChat"
  team_goal: "协同完成软件项目开发，包括需求分析、架构设计、代码实现和质量保证"
  termination_conditions:
    max_rounds: 40
    success_criteria:
      - "所有智能体确认任务完成"
      - "产出符合要求的交付物（需求文档、架构设计、源代码）"
      - "代码通过基本质量检查"
    failure_criteria:
      - "连续5轮无有效进展"
      - "检测到无法解决的技术冲突"
      - "超过最大对话轮次"
  description: "模拟真实的软件开发团队，包含产品经理、架构师和全栈开发者三个角色，协同完成软件项目开发"
  version: "1.0.0"

# ============================================
# 二、全局模型配置（可选）
# ============================================
global_model_config:
  model_name: "gpt-4o"
  api_key: "sk-proj-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
  base_url: "https://api.openai.com/v1"
  temperature: 0.7
  max_tokens: 2000

# ============================================
# 三、智能体列表（必填）
# ============================================
agents:
  # ============================================
  # 智能体1：产品经理
  # ============================================
  - agent_metadata:
      agent_id: "product_manager_001"
      agent_name: "产品经理"
      agent_type: "DialogAgent"
      description: "负责需求分析、产品规划、任务协调和进度跟踪"
      version: "1.0.0"
      tags:
        - "产品管理"
        - "需求分析"
        - "项目协调"

    model_config:
      temperature: 0.6

    prompt_config:
      system_prompt: |
        你是一个经验丰富的产品经理，负责协调团队完成软件开发项目。

        你的核心职责：
        1. 需求分析：深入理解用户需求，将其转化为清晰的产品需求文档（PRD）
        2. 任务分解：将复杂项目拆解为可执行的开发任务
        3. 进度协调：跟踪开发进度，确保项目按时交付
        4. 质量把控：确保交付的产品符合用户需求和业务目标
        5. 团队沟通：作为团队与用户之间的桥梁，确保信息准确传递

        工作原则：
        - 以用户价值为中心，始终关注用户体验
        - 用数据和事实支撑决策，避免主观臆断
        - 保持技术可行性意识，与团队充分沟通
        - 设定合理的优先级和时间预期
        - 及时识别和化解项目风险

        输出标准：
        - 需求文档：结构清晰，包含功能描述、用户故事、验收标准
        - 任务描述：具体、可衡量、可达成、相关性、时限性（SMART原则）
        - 沟通简洁明了，避免技术术语，确保所有成员都能理解

      user_prompt_template: "产品需求：{product_requirement}\n请分析需求并制定开发计划。"

    memory_config:
      memory_type: "short_term"
      max_history_rounds: 25

    behavior_config:
      max_conversation_rounds: 50
      auto_reply: true

    tool_config:
      tools:
        - tool_id: "requirement_analyzer"
          tool_name: "需求分析工具"
          tool_type: "api"
          description: "分析用户需求文本，提取关键功能点和技术要求"
          tool_config:
            endpoint: "https://api.example.com/analyze"
            method: "POST"

  # ============================================
  # 智能体2：架构师
  # ============================================
  - agent_metadata:
      agent_id: "architect_001"
      agent_name: "技术架构师"
      agent_type: "DialogAgent"
      description: "负责系统架构设计、技术选型和代码审查"
      version: "1.0.0"
      tags:
        - "系统架构"
        - "技术选型"
        - "代码审查"

    model_config:
      temperature: 0.4

    prompt_config:
      system_prompt: |
        你是一个资深的系统架构师，负责软件系统的技术设计和架构规划。

        你的专业领域：
        1. 架构设计：设计高可用、高性能、可扩展的系统架构
        2. 技术选型：根据项目特点选择合适的技术栈和框架
        3. 接口设计：定义清晰的API接口和数据结构
        4. 安全设计：确保系统安全性和数据保护
        5. 性能优化：提供性能优化建议和最佳实践

        设计原则：
        - 遵循SOLID原则和设计模式
        - 优先考虑系统的可维护性和可扩展性
        - 在成本、性能、复杂度之间找到最佳平衡点
        - 选择成熟稳定的技术，避免过度创新
        - 考虑系统的监控、日志和运维需求

        输出标准：
        - 架构图：清晰展示系统组件和交互关系
        - 技术方案：包含技术栈、框架选择、部署方案
        - 接口文档：详细的API定义和数据结构
        - 实施指导：提供开发人员可遵循的技术规范

      user_prompt_template: "技术需求：{tech_requirement}\n请设计技术方案和系统架构。"

    tool_config:
      tools:
        - tool_id: "tech_stack_recommender"
          tool_name: "技术栈推荐引擎"
          tool_type: "database"
          description: "根据项目特点推荐最合适的技术栈"
          tool_config:
            connection_string: "postgresql://user:password@localhost:5432/tech_stack"
            table_name: "technology_catalog"
            criteria:
              - "项目规模"
              - "性能要求"
              - "团队技术能力"
              - "预算约束"

        - tool_id: "architecture_validator"
          tool_name: "架构验证工具"
          tool_type: "api"
          description: "验证架构设计的合理性和潜在风险"
          tool_config:
            endpoint: "https://api.example.com/validate_architecture"
            method: "POST"

  # ============================================
  # 智能体3：全栈开发者
  # ============================================
  - agent_metadata:
      agent_id: "fullstack_developer_001"
      agent_name: "全栈开发者"
      agent_type: "FunctionCallAgent"
      description: "负责前端界面、后端API和数据库实现"
      version: "1.0.0"
      tags:
        - "前端开发"
        - "后端开发"
        - "数据库设计"

    model_config:
      temperature: 0.3

    prompt_config:
      system_prompt: |
        你是一个经验丰富的全栈开发工程师，能够独立完成前后端开发任务。

        技术能力：
        1. 前端开发：React/Vue.js，HTML/CSS/JavaScript，响应式设计
        2. 后端开发：Python/Node.js/Go，RESTful API，微服务架构
        3. 数据库：MySQL/PostgreSQL/MongoDB，查询优化，数据建模
        4. DevOps：Docker，CI/CD，云服务部署
        5. 测试：单元测试，集成测试，自动化测试

        开发原则：
        - 编写清晰、可维护的代码，遵循团队编码规范
        - 注重代码质量和测试覆盖率
        - 在开发过程中考虑安全性、性能和用户体验
        - 及时反馈技术难点和风险
        - 编写清晰的技术文档和API文档

        编码标准：
        - 使用有意义的变量和函数命名
        - 添加适当的注释解释复杂逻辑
        - 遵循DRY（Don't Repeat Yourself）原则
        - 保持函数简洁，单一职责
        - 处理边界情况和异常情况

      user_prompt_template: "开发任务：{dev_task}\n请实现相应的功能代码。"

    tool_config:
      tools:
        - tool_id: "code_generator"
          tool_name: "代码生成器"
          tool_type: "sandbox"
          description: "根据需求生成高质量的前后端代码"
          tool_config:
            supported_languages:
              - "python"
              - "javascript"
              - "typescript"
              - "go"
            code_style: "pep8"  # 或 "google" 风格指南
            include_comments: true
            include_tests: true

        - tool_id: "code_executor"
          tool_name: "代码执行器"
          tool_type: "sandbox"
          description: "在安全沙箱环境中执行和测试代码"
          tool_config:
            timeout: 30
            max_memory: "512MB"
            enable_network: false

        - tool_id: "database_schema_generator"
          tool_name: "数据库模式生成器"
          tool_type: "database"
          description: "根据业务需求生成数据库表结构和关系"
          tool_config:
            supported_databases:
              - "mysql"
              - "postgresql"
              - "mongodb"
            normalization_level: 3

    behavior_config:
      max_conversation_rounds: 30
      auto_reply: true
      output_format:
        type: "markdown"
        include_reasoning: false

# ============================================
# 四、协作控制配置（必填）
# ============================================
collaboration_config:
  # 定义开发流程中的发言顺序
  speaking_order:
    - "product_manager_001"    # 1. 产品经理提出需求和任务
    - "architect_001"          # 2. 架构师设计技术方案
    - "fullstack_developer_001" # 3. 开发者实现代码
    # 循环执行，直到项目完成

  initial_speaker: "product_manager_001"
  max_conversation_rounds: 40
  allow_active_speaking: true
  collaboration_timeout: 180  # 3分钟超时

  # 开发流程控制
  workflow_control:
    # 是否允许跳过某些角色
    allow_skip_roles: false
    # 是否允许角色之间的直接沟通
    allow_direct_communication: true
    # 审查机制
    review_required:
      - reviewer: "architect_001"
        review_stage: "before_implementation"
      - reviewer: "product_manager_001"
        review_stage: "before_delivery"

# ============================================
# 五、任务上下文（可选）
# ============================================
task_context:
  task_description: |
    本团队需要协同完成一个Web应用项目开发：

    项目背景：
    - 目标：开发一个在线项目管理平台
    - 用户群体：中小企业和自由职业者
    - 核心功能：任务管理、团队协作、进度跟踪、报告生成

    开发流程：
    1. 需求分析阶段：产品经理分析用户需求，输出PRD文档
    2. 架构设计阶段：架构师设计系统架构，选择技术栈
    3. 开发实现阶段：开发者按架构设计实现功能代码
    4. 测试验收阶段：验证功能完整性和质量标准

    质量标准：
    - 前端：响应式设计，支持主流浏览器
    - 后端：API响应时间<200ms，可用性>99.5%
    - 代码：测试覆盖率>80%，代码审查通过率100%

  constraints:
    - "开发周期：4-6周"
    - "技术栈：前端使用React，后端使用Python FastAPI"
    - "数据库：使用PostgreSQL"
    - "部署：支持Docker容器化部署"
    - "预算：考虑开源技术优先"

  output_format:
    deliverables:
      - "产品需求文档（PRD）"
      - "系统架构设计文档"
      - "API接口文档"
      - "前端React应用"
      - "后端FastAPI服务"
      - "数据库迁移脚本"
      - "部署配置文件"
      - "用户使用手册"

    format_standard: "所有文档使用Markdown格式，代码遵循对应语言的官方编码规范"

    quality_requirements:
      - "前端页面加载时间<2秒"
      - "API响应时间<200ms（P95）"
      - "代码测试覆盖率>80%"
      - "所有API都有完整的文档注释"
      - "通过安全漏洞扫描"
      - "支持不少于1000并发用户"

  reference_context:
    - "敏捷开发方法论（Scrum）"
    - "RESTful API设计最佳实践"
    - "React官方文档推荐模式"
    - "FastAPI高性能框架指南"

# ============================================
# 六、对话记录与日志（可选）
# ============================================
logging_config:
  save_conversation_history: true
  conversation_history_path: "./logs/dev_team_conversations/"
  log_level: "INFO"
  log_file_path: "./logs/dev_team.log"
  log_agent_reasoning: true
  log_tool_calls: true

  # 开发团队特定日志
  development_logging:
    # 记录代码审查过程
    log_code_reviews: true
    # 记录技术决策过程
    log_technical_decisions: true
    # 记录问题解决过程
    log_issue_resolution: true

# ============================================
# 七、高级配置（可选）
# ============================================
advanced_config:
  communication_config:
    allow_direct_communication: true
    broadcast_mode: "all_to_all"
    # 特定通信规则
    communication_rules:
      - from: "product_manager_001"
        to: "architect_001"
        priority: "high"
      - from: "architect_001"
        to: "fullstack_developer_001"
        priority: "high"

  conflict_resolution:
    strategy: "manager_decides"
    # 产品经理作为最终决策者
    decision_maker: "product_manager_001"
    # 技术冲突由架构师裁决
    technical_conflict_resolver: "architect_001"

  performance_config:
    enable_parallel_execution: false
    max_parallel_agents: 1
    # 开发流程通常是顺序的，不建议并行

  # 敏捷开发支持
  agile_support:
    enable_sprint_planning: true
    sprint_duration: "2weeks"
    daily_standup: true
    retrospective_meeting: true

# ============================================
# 八、监控与告警（可选）
# ============================================
monitoring_config:
  enable_monitoring: true
  metrics:
    - "task_completion_rate"
    - "code_quality_score"
    - "collaboration_efficiency"
    - "iteration_time"

  alerts:
    - alert_name: "任务进度延误"
      alert_condition: "任务完成时间超过预估的150%"
      alert_action: "通知产品经理重新评估"

    - alert_name: "代码质量下降"
      alert_condition: "代码审查通过率<80%或测试覆盖率<70%"
      alert_action: "要求架构师审查并指导改进"

    - alert_name: "协作冲突"
      alert_condition: "同一问题讨论超过10轮无结论"
      alert_action: "产品经理介入决策"

# ============================================
# 九、扩展配置（可选）
# ============================================
extension_config:
  custom_settings:
    # 项目信息
    project_name: "在线项目管理平台"
    project_code: "PMS-2024-001"
    # 团队时区
    team_timezone: "Asia/Shanghai"
    # 工作时间
    working_hours:
      start: "09:00"
      end: "18:00"
      weekends: false

  # 团队插件
  team_plugins:
    - plugin_name: "task_tracker"
      plugin_config:
        enable_task_tracking: true
        tracking_method: "kanban"
        board_columns:
          - "Backlog"
          - "In Progress"
          - "Code Review"
          - "Testing"
          - "Done"

    - plugin_name: "code_quality_checker"
      plugin_config:
        enable_auto_check: true
        check_frequency: "on_commit"
        quality_metrics:
          - "complexity"
          - "duplication"
          - "security"
          - "style"

    - plugin_name: "documentation_generator"
      plugin_config:
        auto_generate_docs: true
        doc_format: "markdown"
        include_api_docs: true
        include_architecture_diagrams: true
